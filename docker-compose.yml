services:

  controller:
    build: ./controller
    container_name: controller
    hostname: controller
    user: root
    networks: [jenkins_net]
    ports:
      - "8081:8080"      # UI & WebSocket agents via 8080
      - "50000:50000"    # only needed for TCP JNLP agent (agent_jnlp)
    environment:
      - JENKINS_SLAVE_AGENT_PORT=50000
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
      - CASC_JENKINS_CONFIG=/var/jenkins_home/casc/jenkins.yaml
    volumes:
      - jenkins_home:/var/jenkins_home
      - jenkins_keys:/keys
      - ./scripts/controller-entrypoint.sh:/usr/local/bin/controller-entrypoint.sh:ro
    entrypoint: ["/usr/bin/tini", "--", "/usr/local/bin/controller-entrypoint.sh"]
    restart: unless-stopped

  agent_ssh:
    image: ubuntu:22.04
    container_name: agent_ssh
    hostname: agent_ssh
    networks: [jenkins_net]
    environment:
      - AGENT_WORKDIR=/home/jenkins/agent
      - AUTH_KEY_FILE=/keys/id_rsa.pub
    volumes:
      - ubuntu_ssh_work:/home/jenkins/agent
      - jenkins_keys:/keys:ro
      - ./scripts/agent-ssh-entrypoint.sh:/usr/local/bin/agent-ssh-entrypoint.sh:ro
    entrypoint: ["/usr/local/bin/agent-ssh-entrypoint.sh"]
    restart: unless-stopped
    depends_on: [controller]

  # JNLP over TCP (50000)
  agent_jnlp:
    image: jenkins/inbound-agent:latest-jdk21
    container_name: agent_jnlp
    hostname: agent_jnlp
    networks: [jenkins_net]
    environment:
      - JENKINS_URL=http://controller:8080
      - JENKINS_AGENT_NAME=ubuntu_jnlp
      - JENKINS_SECRET_FILE=/keys/ubuntu_jnlp.secret
    volumes:
      - ubuntu_jnlp_work:/home/jenkins/agent
      - jenkins_keys:/keys:ro
      - ./scripts/inbound-agent-entrypoint.sh:/usr/local/bin/inbound-agent-entrypoint.sh:ro
    entrypoint: ["/usr/local/bin/inbound-agent-entrypoint.sh"]
    restart: unless-stopped
    depends_on: [controller]

  # JNLP over WebSocket
  agent_jnlp_ws:
    image: jenkins/inbound-agent:latest-jdk21
    container_name: agent_jnlp_ws
    hostname: agent_jnlp_ws
    networks: [jenkins_net]
    environment:
      - JENKINS_URL=http://controller:8080
      - JENKINS_AGENT_NAME=ubuntu_ws
      - JENKINS_SECRET_FILE=/keys/ubuntu_ws.secret
      - JENKINS_WEB_SOCKET=true
    volumes:
      - ubuntu_ws_work:/home/jenkins/agent
      - jenkins_keys:/keys:ro
      - ./scripts/inbound-agent-entrypoint.sh:/usr/local/bin/inbound-agent-entrypoint.sh:ro
    entrypoint: ["/usr/local/bin/inbound-agent-entrypoint.sh"]
    restart: unless-stopped
    depends_on: [controller]

networks:
  jenkins_net:
    name: jenkins_net

volumes:
  jenkins_home:
  jenkins_keys:
  ubuntu_ssh_work:
  ubuntu_jnlp_work:
  ubuntu_ws_work:
